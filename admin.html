<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 | AI Life</title>
  <style>
    :root { color-scheme: dark; --bg: #050811; --panel: #091925; --panel-strong: #0b2333; --line: rgba(69,232,255,.3); --cyan: #45e8ff; --orange: #ff9f35; --text: #effcff; --muted: #9dc6d1; --green: #6ef0b1; --danger: #ff8390; }
    * { box-sizing: border-box; }
    body { min-width: 320px; min-height: 100vh; margin: 0; color: var(--text); font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background: radial-gradient(circle at 70% 0%, rgba(69,232,255,.11), transparent 32rem), linear-gradient(155deg, #091625, var(--bg) 58%); }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    .app { display: grid; grid-template-columns: 222px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { display: flex; flex-direction: column; padding: 24px 14px; border-right: 1px solid var(--line); background: rgba(5, 14, 23, .78); }
    .brand { padding: 0 10px 26px; border-bottom: 1px solid rgba(69,232,255,.18); }
    .brand small, .eyebrow { color: var(--cyan); font-size: 12px; font-weight: 700; }
    .brand h1 { margin: 6px 0 0; font-size: 22px; }
    .nav { display: grid; gap: 5px; margin-top: 22px; }
    .nav button { display: flex; align-items: center; width: 100%; min-height: 42px; padding: 0 11px; border: 0; border-left: 3px solid transparent; border-radius: 5px; color: #b9dce4; background: transparent; text-align: left; }
    .nav button:hover, .nav button.active { border-left-color: var(--cyan); color: var(--text); background: rgba(69,232,255,.12); }
    .sidebar-footer { margin-top: auto; padding: 16px 10px 0; border-top: 1px solid rgba(69,232,255,.18); }
    .sidebar-footer a { color: #b9f8ff; font-size: 13px; text-decoration: none; }
    .main { min-width: 0; padding: 34px clamp(22px, 4vw, 58px) 56px; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
    .topbar h2 { margin: 5px 0 0; font-size: 30px; }
    .topbar p { margin: 8px 0 0; color: var(--muted); }
    .account { display: grid; justify-items: end; gap: 5px; color: #cdebf1; font-size: 14px; }
    .account a { color: var(--cyan); font-size: 13px; text-decoration: none; }
    .workspace { display: grid; gap: 16px; }
    .panel { border: 1px solid var(--line); border-radius: 8px; background: rgba(8, 25, 37, .84); box-shadow: inset 0 0 28px rgba(69,232,255,.025); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 14px; min-height: 66px; padding: 14px 18px; border-bottom: 1px solid rgba(69,232,255,.18); }
    .panel-header h3 { margin: 0; font-size: 17px; }
    .panel-header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .toolbar { display: flex; align-items: center; gap: 9px; }
    .button { min-height: 36px; padding: 0 12px; border: 1px solid rgba(69,232,255,.62); border-radius: 5px; color: #c5f8ff; background: rgba(14, 68, 83, .28); }
    .button:hover { border-color: var(--cyan); background: rgba(69,232,255,.15); }
    .button.accent { border-color: rgba(255,159,53,.78); color: #ffe4c5; background: rgba(91,49,13,.35); }
    .button.danger { border-color: rgba(255,131,144,.7); color: #ffd8dd; background: rgba(109,28,42,.34); }
    .button.subtle { border-color: rgba(157,198,209,.45); color: #c9e5eb; background: transparent; }
    .count { color: var(--cyan); font-size: 13px; }
    .empty { padding: 38px 20px; color: var(--muted); text-align: center; }
    .hidden { display: none !important; }
    .status { padding: 10px 13px; border: 1px solid rgba(69,232,255,.36); border-radius: 5px; color: #bceff6; background: rgba(10,53,67,.44); }
    .status.error { border-color: rgba(255,131,144,.65); color: #ffd6da; background: rgba(95,25,40,.38); }
    .user-controls { display: flex; align-items: center; gap: 10px; }
    .search { width: min(340px, 48vw); min-height: 36px; padding: 0 10px; border: 1px solid rgba(69,232,255,.4); border-radius: 5px; color: var(--text); background: rgba(3,12,20,.7); outline: none; }
    .search:focus { border-color: var(--cyan); }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 13px 18px; border-bottom: 1px solid rgba(69,232,255,.13); text-align: left; vertical-align: middle; }
    .table th { color: #99cbd6; font-size: 12px; font-weight: 700; }
    .table td { font-size: 14px; }
    .table tr:last-child td { border-bottom: 0; }
    .name { display: grid; gap: 3px; font-weight: 700; }
    .subtle-text { color: var(--muted); font-size: 12px; font-weight: 400; }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { display: inline-flex; align-items: center; min-height: 23px; padding: 0 8px; border: 1px solid rgba(69,232,255,.35); border-radius: 999px; color: #c6f5fa; background: rgba(69,232,255,.08); font-size: 12px; }
    .pill.default { border-color: rgba(255,159,53,.68); color: #ffe0bc; background: rgba(255,159,53,.1); }
    .split { display: grid; grid-template-columns: minmax(230px, .85fr) minmax(0, 1.45fr); gap: 16px; }
    .group-list { padding: 8px; }
    .group-row { width: 100%; display: grid; gap: 5px; padding: 13px; border: 1px solid transparent; border-radius: 5px; color: inherit; background: transparent; text-align: left; }
    .group-row:hover, .group-row.active { border-color: rgba(69,232,255,.38); background: rgba(69,232,255,.09); }
    .group-row strong { font-size: 14px; }
    .group-meta { color: var(--muted); font-size: 12px; }
    .detail { padding: 20px; }
    .detail-title { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .detail-title h4 { margin: 0; font-size: 20px; }
    .detail-title p { margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .section-label { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 25px 0 10px; color: #cdebf1; font-size: 14px; font-weight: 700; }
    .member-list, .grant-list { display: grid; border-top: 1px solid rgba(69,232,255,.18); }
    .member-row, .grant-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 54px; border-bottom: 1px solid rgba(69,232,255,.13); }
    .member-row:last-child, .grant-row:last-child { border-bottom: 0; }
    .member-row .button { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .grant-state { display: flex; align-items: center; gap: 10px; }
    .grant-state input { width: 18px; height: 18px; accent-color: var(--cyan); }
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .project-item { min-height: 160px; padding: 17px; border: 1px solid var(--line); border-radius: 7px; background: rgba(8,26,39,.74); }
    .project-item h4 { margin: 0; font-size: 17px; }
    .project-item p { margin: 8px 0 16px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .project-item small { color: #9dc6d1; }
    dialog { width: min(440px, calc(100vw - 32px)); padding: 0; border: 1px solid rgba(69,232,255,.55); border-radius: 8px; color: var(--text); background: #081b29; box-shadow: 0 24px 80px rgba(0,0,0,.6); }
    dialog::backdrop { background: rgba(0,0,0,.68); }
    .dialog-body { display: grid; gap: 14px; padding: 20px; }
    .dialog-body h3 { margin: 0; font-size: 19px; }
    .field { display: grid; gap: 7px; }
    .field label { color: #b9dbe3; font-size: 13px; }
    .field input, .field textarea { width: 100%; padding: 9px 10px; border: 1px solid rgba(69,232,255,.4); border-radius: 5px; color: var(--text); background: rgba(3,12,20,.7); outline: none; }
    .field textarea { min-height: 84px; resize: vertical; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 9px; padding-top: 4px; }
    .candidate-list { display: grid; max-height: 280px; overflow: auto; border-top: 1px solid rgba(69,232,255,.18); }
    .candidate { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(69,232,255,.13); }
    .confirm { display: flex; align-items: center; gap: 7px; color: #ffd8dd; font-size: 12px; }
    @media (max-width: 820px) { .app { grid-template-columns: 1fr; } .sidebar { display: flex; flex-direction: row; align-items: center; gap: 10px; padding: 12px 14px; border-right: 0; border-bottom: 1px solid var(--line); overflow-x: auto; } .brand { min-width: max-content; padding: 0 15px 0 0; border-bottom: 0; border-right: 1px solid rgba(69,232,255,.18); } .brand h1 { font-size: 17px; } .nav { display: flex; margin: 0; } .nav button { min-width: max-content; border-left: 0; border-bottom: 3px solid transparent; } .nav button:hover, .nav button.active { border-left-color: transparent; border-bottom-color: var(--cyan); } .sidebar-footer { display: none; } .main { padding: 24px 16px 42px; } .topbar { display: grid; } .account { justify-items: start; } .split { grid-template-columns: 1fr; } .table-wrap { overflow-x: auto; } .table { min-width: 680px; } }
    @media (max-width: 520px) { .topbar h2 { font-size: 25px; } .panel-header, .detail-title { align-items: flex-start; flex-direction: column; } .user-controls { width: 100%; } .search { width: 100%; } .toolbar { flex-wrap: wrap; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><small>AI LIFE / ADMIN</small><h1>后台管理</h1></div>
      <nav class="nav" aria-label="后台导航">
        <button class="active" type="button" data-view="users">用户</button>
        <button type="button" data-view="groups">分组与权限</button>
        <button type="button" data-view="projects">项目</button>
      </nav>
      <div class="sidebar-footer"><a href="/">返回项目首页</a></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><div class="eyebrow">ACCESS CONTROL</div><h2 id="pageTitle">用户</h2><p id="pageSubtitle">查看用户所属分组与项目访问范围。</p></div>
        <div class="account"><span id="accountName">正在确认身份...</span><a href="/">返回项目首页</a></div>
      </header>
      <div id="status" class="status hidden" role="status"></div>
      <section id="usersView" class="workspace"></section>
      <section id="groupsView" class="workspace hidden"></section>
      <section id="projectsView" class="workspace hidden"></section>
    </main>
  </div>

  <dialog id="groupDialog">
    <form id="groupForm" class="dialog-body" method="dialog">
      <h3 id="groupDialogTitle">新建分组</h3>
      <div class="field"><label for="groupName">分组名称</label><input id="groupName" name="name" maxlength="80" required /></div>
      <div class="field"><label for="groupDescription">说明</label><textarea id="groupDescription" name="description" maxlength="240"></textarea></div>
      <div class="dialog-actions"><button class="button subtle" type="button" data-close-dialog>取消</button><button class="button accent" type="submit">保存</button></div>
    </form>
  </dialog>
  <dialog id="memberDialog">
    <div class="dialog-body">
      <h3>管理成员</h3>
      <div class="field"><label for="memberSearch">搜索用户</label><input id="memberSearch" placeholder="显示名或邮箱" /></div>
      <div id="candidateList" class="candidate-list"></div>
      <div class="dialog-actions"><button class="button subtle" type="button" data-close-dialog>关闭</button></div>
    </div>
  </dialog>

  <script>
    const state = { users: [], groups: [], projects: [], selectedGroupId: null, view: "users", groupEditingId: null, deletePendingId: null, userFilter: "" };
    const views = { users: document.getElementById("usersView"), groups: document.getElementById("groupsView"), projects: document.getElementById("projectsView") };
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const statusElement = document.getElementById("status");
    const accountName = document.getElementById("accountName");
    const groupDialog = document.getElementById("groupDialog");
    const memberDialog = document.getElementById("memberDialog");
    const groupForm = document.getElementById("groupForm");
    const groupName = document.getElementById("groupName");
    const groupDescription = document.getElementById("groupDescription");
    const memberSearch = document.getElementById("memberSearch");
    const candidateList = document.getElementById("candidateList");

    const viewCopy = { users: ["用户", "查看用户所属分组与项目访问范围。"], groups: ["分组与权限", "为分组配置项目权限，并维护成员归属。"], projects: ["项目", "只读查看已配置项目及其分组覆盖范围。"] };
    function escapeHtml(value) { const node = document.createElement("span"); node.textContent = String(value || ""); return node.innerHTML; }
    function escapeAttribute(value) { return escapeHtml(value).replace(/"/g, "&quot;"); }
    function currentGroup() { return state.groups.find((group) => group.id === state.selectedGroupId) || state.groups[0] || null; }
    function groupNameById(id) { return state.groups.find((group) => group.id === id)?.name || "未命名分组"; }
    function showStatus(message, error = false) { statusElement.textContent = message; statusElement.classList.remove("hidden"); statusElement.classList.toggle("error", error); }
    function clearStatus() { statusElement.classList.add("hidden"); }
    async function request(path, options = {}) {
      const response = await fetch(path, { headers: { "Content-Type": "application/json", ...(options.headers || {}) }, ...options });
      if (response.status === 401) { window.location.assign("/login?next=/admin"); throw new Error("需要登录。"); }
      if (response.status === 403) { window.location.assign("/"); throw new Error("需要管理员权限。"); }
      if (response.status === 503) { const data = await response.json(); throw new Error(data.message || "服务暂不可用。"); }
      if (!response.ok) { const data = await response.json().catch(() => ({})); throw new Error(data.message || "请求失败。"); }
      if (response.status === 204) return null;
      return response.json();
    }
    async function loadOverview() {
      const data = await request("/api/admin/overview");
      state.users = data.users || [];
      state.groups = data.groups || [];
      state.projects = data.projects || [];
      if (!state.groups.some((group) => group.id === state.selectedGroupId)) state.selectedGroupId = state.groups[0]?.id || null;
      render();
    }
    function setView(view) {
      state.view = view;
      const [title, subtitle] = viewCopy[view];
      pageTitle.textContent = title;
      pageSubtitle.textContent = subtitle;
      document.querySelectorAll("[data-view]").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
      Object.entries(views).forEach(([name, element]) => element.classList.toggle("hidden", name !== view));
      render();
    }
    function renderUsers() {
      const keyword = state.userFilter.trim().toLowerCase();
      const users = state.users.filter((user) => !keyword || user.email.toLowerCase().includes(keyword) || user.displayName.toLowerCase().includes(keyword));
      views.users.innerHTML = `
        <div class="panel">
          <div class="panel-header"><div><h3>用户列表 <span class="count">${users.length}</span></h3><p>用户项目权限由所属分组决定。</p></div><div class="user-controls"><input id="userSearch" class="search" value="${escapeAttribute(state.userFilter)}" placeholder="搜索显示名或邮箱" /></div></div>
          <div class="table-wrap"><table class="table"><thead><tr><th>用户</th><th>所属分组</th><th>管理员</th><th>注册时间</th></tr></thead><tbody>${users.length ? users.map((user) => `<tr><td><div class="name">${escapeHtml(user.displayName)}<span class="subtle-text">${escapeHtml(user.email)}</span></div></td><td><div class="pills">${user.groups.length ? user.groups.map((group) => `<span class="pill ${group.isDefault ? "default" : ""}">${escapeHtml(group.name)}</span>`).join("") : '<span class="subtle-text">未分组</span>'}</div></td><td>${user.isAdmin ? '<span class="pill">管理员</span>' : '<span class="subtle-text">普通用户</span>'}</td><td class="subtle-text">${escapeHtml(new Date(user.createdAt).toLocaleDateString("zh-CN"))}</td></tr>`).join("") : '<tr><td colspan="4" class="empty">未找到匹配用户。</td></tr>'}</tbody></table></div>
        </div>`;
      document.getElementById("userSearch")?.addEventListener("input", (event) => { state.userFilter = event.target.value; renderUsers(); });
    }
    function renderGroups() {
      const selected = currentGroup();
      const members = selected ? state.users.filter((user) => user.groups.some((group) => group.id === selected.id)) : [];
      views.groups.innerHTML = `
        <div class="split">
          <aside class="panel"><div class="panel-header"><div><h3>分组 <span class="count">${state.groups.length}</span></h3><p>用户通过分组获得项目权限。</p></div><button class="button accent" type="button" data-action="create-group">+ 新建分组</button></div><div class="group-list">${state.groups.length ? state.groups.map((group) => `<button class="group-row ${group.id === selected?.id ? "active" : ""}" type="button" data-group-id="${escapeAttribute(group.id)}"><strong>${escapeHtml(group.name)} ${group.isDefault ? '<span class="pill default">默认分组</span>' : ""}</strong><span class="group-meta">${group.memberCount} 位成员 · ${group.projectIds.length} 个项目</span></button>`).join("") : '<div class="empty">暂无分组。</div>'}</div></aside>
          <section class="panel">${selected ? `<div class="detail"><div class="detail-title"><div><h4>${escapeHtml(selected.name)} ${selected.isDefault ? '<span class="pill default">默认分组</span>' : ""}</h4><p>${escapeHtml(selected.description || "暂无说明")}${selected.isDefault ? " 新注册用户会自动加入此分组。" : ""}</p></div><div class="toolbar">${selected.isDefault ? "" : `<button class="button subtle" type="button" data-action="edit-group">编辑分组</button><span id="deleteArea">${state.deletePendingId === selected.id ? '<span class="confirm">确认删除？<button class="button danger" type="button" data-action="confirm-delete">删除</button><button class="button subtle" type="button" data-action="cancel-delete">取消</button></span>' : '<button class="button danger" type="button" data-action="request-delete">删除分组</button>'}</span>`}</div></div><div class="section-label"><span>成员 <span class="count">${members.length}</span></span><button class="button" type="button" data-action="manage-members">管理成员</button></div><div class="member-list">${members.length ? members.map((user) => `<div class="member-row"><div class="name">${escapeHtml(user.displayName)}<span class="subtle-text">${escapeHtml(user.email)}</span></div>${selected.isDefault ? '<span class="subtle-text">自动加入</span>' : `<button class="button danger" type="button" data-action="remove-member" data-user-id="${escapeAttribute(user.id)}">移出分组</button>`}</div>`).join("") : '<div class="empty">该分组暂无成员。</div>'}</div><div class="section-label"><span>可访问项目</span><span class="subtle-text">开通后组内成员可见</span></div><div class="grant-list">${state.projects.length ? state.projects.map((project) => { const enabled = selected.projectIds.includes(project.id); const protectedGrant = selected.isDefault && project.code === "wearable-monitoring"; return `<label class="grant-row"><div class="name">${escapeHtml(project.name)}<span class="subtle-text">${escapeHtml(project.description)}</span></div><span class="grant-state"><span class="subtle-text">${enabled ? "已开通" : "未开通"}</span><input type="checkbox" data-action="toggle-project" data-project-id="${escapeAttribute(project.id)}" ${enabled ? "checked" : ""} ${protectedGrant ? "disabled" : ""} /></span></label>`; }).join("") : '<div class="empty">暂无可配置项目。</div>'}</div></div>` : '<div class="empty">请选择一个分组。</div>'}</section>
        </div>`;
    }
    function renderProjects() {
      views.projects.innerHTML = `<div class="panel"><div class="panel-header"><div><h3>项目列表 <span class="count">${state.projects.length}</span></h3><p>项目由系统配置；此处只读展示对应的分组覆盖范围。</p></div></div><div class="detail"><div class="project-grid">${state.projects.length ? state.projects.map((project) => `<article class="project-item"><h4>${escapeHtml(project.name)}</h4><p>${escapeHtml(project.description)}</p><small>${project.isActive ? "已启用" : "已停用"} · ${project.groupIds.length} 个分组已开通</small><div class="pills" style="margin-top:12px">${project.groupIds.length ? project.groupIds.map((id) => `<span class="pill">${escapeHtml(groupNameById(id))}</span>`).join("") : '<span class="subtle-text">暂无授权分组</span>'}</div></article>`).join("") : '<div class="empty">暂无项目。</div>'}</div></div></div>`;
    }
    function render() { renderUsers(); renderGroups(); renderProjects(); setViewVisibility(); }
    function setViewVisibility() { Object.entries(views).forEach(([name, element]) => element.classList.toggle("hidden", name !== state.view)); }
    function openGroupDialog(group = null) { state.groupEditingId = group?.id || null; document.getElementById("groupDialogTitle").textContent = group ? "编辑分组" : "新建分组"; groupName.value = group?.name || ""; groupDescription.value = group?.description || ""; groupDialog.showModal(); }
    function renderCandidates() {
      const selected = currentGroup();
      const keyword = memberSearch.value.trim().toLowerCase();
      const candidates = state.users.filter((user) => !user.groups.some((group) => group.id === selected?.id) && (!keyword || user.email.toLowerCase().includes(keyword) || user.displayName.toLowerCase().includes(keyword)));
      candidateList.innerHTML = candidates.length ? candidates.map((user) => `<div class="candidate"><div class="name">${escapeHtml(user.displayName)}<span class="subtle-text">${escapeHtml(user.email)}</span></div><button class="button" type="button" data-action="add-member" data-user-id="${escapeAttribute(user.id)}">加入分组</button></div>`).join("") : '<div class="empty">没有可添加的用户。</div>';
    }
    async function mutate(path, options) { clearStatus(); try { await request(path, options); await loadOverview(); return true; } catch (error) { showStatus(error.message, true); return false; } }

    document.querySelectorAll("[data-view]").forEach((button) => button.addEventListener("click", () => setView(button.dataset.view)));
    document.addEventListener("click", async (event) => {
      const target = event.target.closest("[data-action], [data-group-id], [data-close-dialog]");
      if (!target) return;
      if (target.hasAttribute("data-close-dialog")) { target.closest("dialog").close(); return; }
      if (target.dataset.groupId) { state.selectedGroupId = target.dataset.groupId; state.deletePendingId = null; renderGroups(); return; }
      const group = currentGroup();
      if (target.dataset.action === "create-group") openGroupDialog();
      if (target.dataset.action === "edit-group") openGroupDialog(group);
      if (target.dataset.action === "request-delete") { state.deletePendingId = group.id; renderGroups(); }
      if (target.dataset.action === "cancel-delete") { state.deletePendingId = null; renderGroups(); }
      if (target.dataset.action === "confirm-delete" && await mutate(`/api/admin/groups/${group.id}`, { method: "DELETE" })) state.deletePendingId = null;
      if (target.dataset.action === "manage-members") { memberSearch.value = ""; renderCandidates(); memberDialog.showModal(); }
      if (target.dataset.action === "add-member") { if (await mutate(`/api/admin/groups/${group.id}/members/${target.dataset.userId}`, { method: "PUT" })) renderCandidates(); }
      if (target.dataset.action === "remove-member") await mutate(`/api/admin/groups/${group.id}/members/${target.dataset.userId}`, { method: "DELETE" });
    });
    document.addEventListener("change", async (event) => {
      const target = event.target;
      if (target.dataset.action !== "toggle-project") return;
      const group = currentGroup();
      const path = `/api/admin/groups/${group.id}/projects/${target.dataset.projectId}`;
      const ok = await mutate(path, { method: target.checked ? "PUT" : "DELETE" });
      if (!ok) renderGroups();
    });
    groupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const body = JSON.stringify({ name: groupName.value, description: groupDescription.value });
      const path = state.groupEditingId ? `/api/admin/groups/${state.groupEditingId}` : "/api/admin/groups";
      const ok = await mutate(path, { method: state.groupEditingId ? "PATCH" : "POST", body });
      if (ok) groupDialog.close();
    });
    memberSearch.addEventListener("input", renderCandidates);
    async function initialize() {
      try {
        const me = await request("/api/auth/me");
        if (!me.user?.isAdmin) { window.location.assign("/"); return; }
        accountName.textContent = me.user.displayName || me.user.email;
        await loadOverview();
      } catch (error) { showStatus(error.message, true); }
    }
    initialize();
  </script>
</body>
</html>
